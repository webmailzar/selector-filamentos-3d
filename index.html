
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Expert - Selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1e3a8a; --bg: #f8fafc; --c: #ffffff; --t: #0f172a; --m: #64748b; --a: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 15px; }
        .container { max-width: 480px; margin: auto; }
        
        header { text-align: center; margin: 20px 0 30px 0; }
        .logo { max-width: 200px; height: auto; }
        h1 { font-size: 1.7rem; font-weight: 900; margin: 10px 0; color: #1e293b; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn { background: var(--c); border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: #1e293b; }
        .btn.active { border-color: var(--p); background: #eff6ff; color: var(--p); }

        .hw-box { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; margin-bottom: 30px; text-align: center; }
        .switch { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-top: 10px; }
        .sw-btn { flex: 1; padding: 12px; font-size: 0.75rem; font-weight: 800; border-radius: 9px; cursor: pointer; color: var(--m); border: none; background: transparent; }
        .sw-btn.active { background: white; color: var(--p); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; position: relative; }
        .card.low-match { display: none; } /* Ocultamos los que no cumplen hardware para no ensuciar */
        
        .title { font-size: 1.8rem; font-weight: 900; margin: 0; color: var(--p); }
        .diff { font-size: 0.6rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-top: 10px; display: inline-block; }
        .d1 { background: #dcfce7; color: #166534; } .d2 { background: #fef9c3; color: #854d0e; } .d3 { background: #fee2e2; color: #991b1b; }
        
        .desc { font-size: 0.95rem; color: #475569; margin: 15px 0; line-height: 1.5; }

        .params { background: #f8fafc; border-radius: 16px; padding: 18px; border: 1px solid #e2e8f0; }
        .p-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding: 8px 0; }
        .p-item:last-child { border-bottom: none; }
        .p-label { font-size: 0.75rem; color: var(--m); font-weight: 800; }
        .p-val { font-size: 0.9rem; font-weight: 800; color: #1e293b; }

        .top-tag { position: absolute; top: 20px; right: 20px; background: var(--a); color: white; font-size: 0.6rem; padding: 5px 12px; border-radius: 100px; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://3dexpert.es/wp-content/uploads/2021/01/logo3dexpert_verde.png" class="logo">
        <h1>Selector de Filamentos</h1>
    </header>

    <div class="grid">
        <div class="btn" onclick="toggleF(this, 'easy')">✨ FÁCIL</div>
        <div class="btn" onclick="toggleF(this, 'uv')">☀️ SOL/UV</div>
        <div class="btn" onclick="toggleF(this, 'water')">💧 AGUA</div>
        <div class="btn" onclick="toggleF(this, 'mech')">🛠️ MECANIZABLE</div>
        <div class="btn" onclick="toggleF(this, 'heat')">🔥 CALOR</div>
        <div class="btn" onclick="toggleF(this, 'flex')">➰ FLEXIBLE</div>
    </div>

    <div class="hw-box">
        <span style="font-size:0.7rem; font-weight:800; color:var(--m); text-transform:uppercase;">Tipo de Impresora</span>
        <div class="switch">
            <button id="b-abierta" class="sw-btn active" onclick="setHW('Abierta')">Abierta</button>
            <button id="b-cerrada" class="sw-btn" onclick="setHW('Cerrada')">Cerrada</button>
            <button id="b-ambas" class="sw-btn" onclick="setHW('Ambas')">Ambas</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
    const db = [
        { name: "PLA Rápido", easy: 10, uv: 2, water: 3, mech: 3, heat: 2, flex: 0, type: "Abierta", diff: 1, desc: "Para alta velocidad. Enfriamiento instantáneo.", nozzle: "210-230°C", bed: "55°C", tools: "Estándar" },
        { name: "PLA+", easy: 10, uv: 4, water: 4, mech: 5, heat: 3, flex: 1, type: "Abierta", diff: 1, desc: "Más resistente que el PLA básico.", nozzle: "215°C", bed: "60°C", tools: "Estándar" },
        { name: "ASA", easy: 2, uv: 10, water: 9, mech: 10, heat: 9, flex: 0, type: "Cerrada", diff: 3, desc: "El mejor para exterior. Resistente UV.", nozzle: "260°C", bed: "105°C", tools: "Estándar" },
        { name: "ABS", easy: 1, uv: 2, water: 7, mech: 10, heat: 9, flex: 0, type: "Cerrada", diff: 3, desc: "Industrial. Pulido con acetona.", nozzle: "245°C", bed: "100°C", tools: "Estándar" },
        { name: "PETG", easy: 8, uv: 7, water: 10, mech: 4, heat: 7, flex: 2, type: "Abierta", diff: 1, desc: "Resistente al agua y químicos.", nozzle: "240°C", bed: "75°C", tools: "Estándar" },
        { name: "PETG-CF", easy: 7, uv: 8, water: 9, mech: 8, heat: 8, flex: 0, type: "Abierta", diff: 2, desc: "Acabado mate y mayor rigidez.", nozzle: "250°C", bed: "80°C", tools: "Acero" },
        { name: "TPU 95A", easy: 6, uv: 7, water: 9, mech: 1, heat: 5, flex: 8, type: "Abierta", diff: 2, desc: "Flexible todoterreno.", nozzle: "235°C", bed: "50°C", tools: "Directo" }
    ];

    let activeF = [];
    let currentHW = 'Abierta';

    function toggleF(btn, key) {
        btn.classList.toggle('active');
        activeF.includes(key) ? activeF = activeF.filter(k => k !== key) : activeF.push(key);
        render();
    }

    function setHW(type) {
        currentHW = type;
        document.getElementById('b-abierta').classList.toggle('active', type === 'Abierta');
        document.getElementById('b-cerrada').classList.toggle('active', type === 'Cerrada');
        document.getElementById('b-ambas').classList.toggle('active', type === 'Ambas');
        render();
    }

    function render() {
        const res = document.getElementById('results');
        res.innerHTML = '';
        let scored = db.map(m => {
            let score = 0;
            activeF.forEach(k => score += m[k]);
            let match = true;
            if (currentHW === 'Abierta' && m.type === 'Cerrada') match = false;
            if (currentHW === 'Cerrada' && m.type === 'Abierta') match = true; // Cerrada imprime todo
            if (currentHW === 'Ambas') match = true;
            return { ...m, score, match };
        });

        scored.sort((a, b) => b.score - a.score);

        scored.forEach((m, i) => {
            if (!m.match) return; // Si no es compatible con el hardware, fuera.
            if (activeF.length > 0 && m.score <= 0) return;

            res.innerHTML += `
                <div class="card">
                    ${i === 0 && activeF.length > 0 ? '<span class="top-tag">RECOMENDADO</span>' : ''}
                    <h2 class="title">${m.name}</h2>
                    <span class="diff d${m.diff}">Dificultad: ${m.diff==1?'Baja':m.diff==2?'Media':'Alta'}</span>
                    <p class="desc">${m.desc}</p>
                    <div class="params">
                        <div class="p-item"><span class="p-label">HOTEND</span><span class="p-val">${m.nozzle}</span></div>
                        <div class="p-item"><span class="p-label">CAMA</span><span class="p-val">${m.bed}</span></div>
                        <div class="p-item"><span class="p-label">HARDWARE</span><span class="p-val">${m.tools}</span></div>
                        <div class="p-item"><span class="p-label">TIPO</span><span class="p-val">${m.type}</span></div>
                    </div>
                </div>`;
        });
    }
    render();
</script>
</body>
</html>
