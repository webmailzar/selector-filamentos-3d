        :root { --p: #2563eb; --bg: #f1f5f9; --c: #ffffff; --t: #0f172a; --m: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 15px; -webkit-tap-highlight-color: transparent; }

        .switch { display: flex; background: #f1f5f9; padding: 4px; border-radius: 10px; margin-top: 12px; border: 1px solid #e2e8f0; }
        .sw-btn { flex: 1; padding: 10px; font-size: 0.75rem; font-weight: 800; border-radius: 7px; cursor: pointer; color: var(--m); transition: 0.2s; }
        .sw-btn.active { background: white; color: var(--p); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .card.risky { opacity: 0.5; filter: grayscale(1); border-style: dashed; }
        .title { font-size: 1.8rem; font-weight: 900; margin: 0; color: var(--p); }
        .diff { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-top: 8px; display: inline-block; background: #f1f5f9; color: #475569; }
        .desc { font-size: 0.9rem; color: #475569; margin: 15px 0; line-height: 1.5; }
        .params { background: #f8fafc; border-radius: 16px; padding: 18px; border: 1px solid #e2e8f0; }
        .p-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .p-item:last-child { border: none; }
        .p-label { font-size: 0.7rem; color: var(--m); font-weight: 700; text-transform: uppercase; }
        .p-val { font-size: 0.85rem; font-weight: 800; color: #1e293b; text-align: right; }
        .tag { position: absolute; top: 20px; right: 20px; background: #f59e0b; color: white; font-size: 0.6rem; padding: 5px 12px; border-radius: 100px; font-weight: 900; }
    </style>
</head>
